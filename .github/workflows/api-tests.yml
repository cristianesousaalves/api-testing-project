name: API Tests - Newman

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  api-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Instalar Newman
        run: npm install -g newman newman-reporter-htmlextra
      - name: Executar testes Open Library
        run: newman run collection/OpenLibrary_API_Tests.postman_collection.json -e environments/openlibrary.postman_environment.json -r cli,htmlextra --reporter-htmlextra-export newman-reports/report.html
      - name: Upload relatorios
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newman-reports
          path: newman-reports/
          retention-days: 30
